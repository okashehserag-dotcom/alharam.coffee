<html lang="ar" dir="rtl">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #f1e3d4;
      --bg-soft: #f7efe7;
      --surface: #fffdfa;
      --surface-2: #fcf8f3;
      --line: #e0cebd;
      --line-soft: #ebdfd4;
      --text: #151210;
      --muted: #6d6259;
      --brown: #6b4a35;
      --brown-2: #8a6248;
      --white: #ffffff;
      --radius-xxl: 34px;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --container: 1200px;
      --shadow-soft: 0 12px 34px rgba(62, 39, 22, 0.05);
      --shadow-card: 0 10px 28px rgba(48, 30, 16, 0.035);
      --transition: 220ms ease;
      --font-ar: "Cairo", sans-serif;
      --font-en: "Montserrat", sans-serif;
    }

    *{ box-sizing: border-box; }

    html{ scroll-behavior: smooth; }

    body{
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.55), transparent 36%),
        linear-gradient(180deg, #f3e7dc 0%, #f1e3d4 100%);
      font-family: var(--font-ar);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    html[lang="en"] body{
      font-family: var(--font-en);
    }

    img{
      display: block;
      max-width: 100%;
    }

    a{
      color: inherit;
      text-decoration: none;
    }

    button{
      font: inherit;
      color: inherit;
    }

    .container{
      width: min(var(--container), calc(100% - 24px));
      margin-inline: auto;
    }

    .site-header{
      padding: 18px 0 10px;
    }

    .header-shell{
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.44));
      border: 1px solid rgba(107,74,53,.10);
      border-radius: var(--radius-xxl);
      padding: 14px 14px 18px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
      animation: fadeUp .5s ease both;
    }

    .header-top{
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 48px;
      margin-bottom: 12px;
    }

    .lang-switch{
      position: absolute;
      inset-inline-end: 0;
      top: 0;
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .lang-btn{
      border: 0;
      background: transparent;
      border-radius: 999px;
      min-width: 68px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }

    .lang-btn:hover{
      transform: translateY(-1px);
    }

    .lang-btn.active{
      background: var(--brown);
      color: var(--white);
    }

    .brand-wrap{
      text-align: center;
      padding: 4px 0 8px;
    }

    .logo-frame{
      width: 138px;
      height: 138px;
      margin: 0 auto 16px;
      border-radius: 30px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fffdfa, #f2e8de);
      border: 1px solid rgba(107,74,53,.10);
      box-shadow: 0 10px 24px rgba(61, 38, 21, 0.04);
      padding: 10px;
    }

    .logo-frame img{
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-ar{
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-en{
      margin: 8px 0 0;
      color: var(--brown);
      font-size: clamp(.86rem, 2vw, 1.04rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .26em;
    }

    .brand-sub{
      width: min(760px, 100%);
      margin: 14px auto 0;
      color: var(--muted);
      font-size: .98rem;
    }

    .top-meta{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .meta-pill{
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      border: 1px solid var(--line-soft);
      color: var(--brown);
      font-size: .86rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .menu-nav-wrap{
      position: sticky;
      top: 10px;
      z-index: 50;
      padding: 10px 0 14px;
    }

    .menu-nav{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(107,74,53,.10);
      border-radius: 999px;
      padding: 10px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
      animation: fadeUp .65s ease both;
    }

    .menu-link{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }

    .menu-link:hover,
    .menu-link.is-active{
      background: var(--white);
      color: var(--brown);
    }

    .page{
      padding: 6px 0 40px;
    }

    .menu-section{
      padding: 14px 0 28px;
      scroll-margin-top: 92px;
    }

    .section-shell{
      background: linear-gradient(180deg, rgba(255,255,255,.46), rgba(255,255,255,.22));
      border: 1px solid rgba(107,74,53,.08);
      border-radius: var(--radius-xl);
      padding: 18px;
    }

    .section-head{
      margin-bottom: 16px;
      animation: fadeUp .55s ease both;
    }

    .section-title{
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      position: relative;
      padding-bottom: 10px;
    }

    .section-title::after{
      content: "";
      position: absolute;
      inset-inline-start: 0;
      bottom: 0;
      width: 78px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--brown), rgba(107,74,53,.18));
    }

    .section-sub{
      margin: 10px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .cards{
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(252,248,243,.98));
      border: 1px solid rgba(107,74,53,.08);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
      animation: fadeUp .55s ease both;
    }

    .card:hover{
      transform: translateY(-2px);
      border-color: rgba(107,74,53,.16);
      background: linear-gradient(180deg, rgba(255,255,255,1), rgba(252,248,243,1));
    }

    .card-media{
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: linear-gradient(180deg, #eadbcf, #e4d2c1);
      border-bottom: 1px solid rgba(107,74,53,.06);
    }

    .card-media img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 260ms ease;
    }

    .card:hover .card-media img{
      transform: scale(1.02);
    }

    .card-body{
      padding: 14px 14px 16px;
    }

    .card-top{
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .item-title{
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.35;
      font-weight: 800;
    }

    .item-price{
      color: var(--brown);
      font-weight: 800;
      font-size: .95rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .item-desc{
      margin: 0;
      color: var(--muted);
      font-size: .93rem;
      line-height: 1.75;
    }

    .addons{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line-soft);
    }

    .addons-title{
      margin: 0 0 8px;
      font-size: .9rem;
      font-weight: 800;
    }

    .addons-list{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .addon-pill{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      border: 1px solid var(--line);
      color: var(--brown);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .addon-pill small{
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    .site-footer{
      padding: 4px 0 28px;
    }

    .footer-box{
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
    }

    .lang-btn:focus-visible,
    .menu-link:focus-visible{
      outline: 2px solid rgba(107,74,53,.28);
      outline-offset: 2px;
    }

    @media (min-width: 640px){
      .header-shell{
        padding: 16px 18px 20px;
      }

      .cards{
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .section-shell{
        padding: 20px;
      }
    }

    @media (min-width: 980px){
      .site-header{
        padding: 24px 0 12px;
      }

      .header-shell{
        padding: 18px 22px 22px;
      }

      .cards{
        grid-template-columns: repeat(3, minmax(0,1fr));
        gap: 16px;
      }

      .section-shell{
        padding: 22px;
      }
    }

    @keyframes fadeUp{
      from{
        opacity: 0;
        transform: translateY(10px);
      }
      to{
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce){
      html{ scroll-behavior: auto; }

      *,
      *::before,
      *::after{
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

        addonsTitle: "Available Toppings",
        currency: "JOD",
        footerText: "Al Haram — Coffee Menu",
        placeholder: "Add product image here"
      }
    };

    const state = {
      lang: "ar"
    };

    const el = {
      html: document.documentElement,
      btnAr: document.getElementById("btnAr"),
      btnEn: document.getElementById("btnEn"),
      brandAr: document.getElementById("brandAr"),
      brandEn: document.getElementById("brandEn"),
      brandSub: document.getElementById("brandSub"),
      metaOne: document.getElementById("metaOne"),
      metaTwo: document.getElementById("metaTwo"),
      metaThree: document.getElementById("metaThree"),
      navHot: document.getElementById("navHot"),
      navCold: document.getElementById("navCold"),
      navCrepe: document.getElementById("navCrepe"),
      navWaffle: document.getElementById("navWaffle"),
      menuNav: document.getElementById("menuNav"),
      menuRoot: document.getElementById("menuRoot"),
      footerText: document.getElementById("footerText")
    };

    function t(key){
      return ui[state.lang][key];
    }

    function getCategoryTitle(category){
      return state.lang === "ar" ? category.title_ar : category.title_en;
    }

    function getCategorySubtitle(category){
      return state.lang === "ar" ? category.subtitle_ar : category.subtitle_en;
    }

    function getProductName(product){
      return state.lang === "ar" ? product.name_ar : product.name_en;
    }

    function getProductDesc(product){
      return state.lang === "ar" ? product.desc_ar : product.desc_en;
    }

    function getAddonName(addon){
      return state.lang === "ar" ? addon.name_ar : addon.name_en;
    }

    function formatPrice(value){
      return `${Number(value).toFixed(2)} ${t("currency")}`;
    }

    function createPlaceholderDataURI(label){
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
          <rect width="800" height="600" fill="#eadbcb"/>
          <rect x="28" y="28" width="744" height="544" rx="24" fill="#f9f2ea" />
          <rect x="28" y="28" width="744" height="544" rx="24" fill="none" stroke="#6b4a35" stroke-width="3" stroke-dasharray="12 10"/>
          <circle cx="400" cy="220" r="58" fill="none" stroke="#6b4a35" stroke-width="10"/>
          <path d="M346 294h108c30 0 50 20 50 48s-20 48-50 48H332c-26 0-48-22-48-48v-32h62" fill="none" stroke="#6b4a35" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="50%" y="466" text-anchor="middle" fill="#6b4a35" font-family="Arial, sans-serif" font-size="28">${label}</text>
          <text x="50%" y="506" text-anchor="middle" fill="#6b4a35" font-family="Arial, sans-serif" font-size="18">assets/products/&lt;id&gt;.jpg</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function setSafeImage(img, src, alt){
      img.alt = alt;
      img.onerror = () => {
        img.onerror = null;
        img.src = createPlaceholderDataURI(t("placeholder"));
      };
      img.src = src;
    }

    function createCard(product, index){
      const card = document.createElement("article");
      card.className = "card";
      card.style.animationDelay = `${index * 45}ms`;

      const media = document.createElement("div");
      media.className = "card-media";

      const image = document.createElement("img");
      image.loading = "lazy";
      setSafeImage(image, `assets/products/${product.id}.jpg`, getProductName(product));
      media.appendChild(image);

      const body = document.createElement("div");
      body.className = "card-body";

      const top = document.createElement("div");
      top.className = "card-top";

      const title = document.createElement("h3");
      title.className = "item-title";
      title.textContent = getProductName(product);

      const price = document.createElement("div");
      price.className = "item-price";
      price.textContent = formatPrice(product.price);

      const desc = document.createElement("p");
      desc.className = "item-desc";
      desc.textContent = getProductDesc(product);

      top.appendChild(title);
      top.appendChild(price);
      body.appendChild(top);
      body.appendChild(desc);

      if (Array.isArray(product.addons) && product.addons.length){
        const addons = document.createElement("div");
        addons.className = "addons";

        const addonsTitle = document.createElement("p");
        addonsTitle.className = "addons-title";
        addonsTitle.textContent = t("addonsTitle");

        const addonsList = document.createElement("div");
        addonsList.className = "addons-list";

        product.addons.forEach(addon => {
          const pill = document.createElement("span");
          pill.className = "addon-pill";
          pill.innerHTML = `${getAddonName(addon)} <small>+ ${formatPrice(addon.price)}</small>`;
          addonsList.appendChild(pill);
        });

        addons.appendChild(addonsTitle);
        addons.appendChild(addonsList);
        body.appendChild(addons);
      }

      card.appendChild(media);
      card.appendChild(body);

      return card;
    }

    function createSection(category){
      const section = document.createElement("section");
      section.className = "menu-section";
      section.id = category.id;

      const shell = document.createElement("div");
      shell.className = "section-shell";

      const head = document.createElement("div");
      head.className = "section-head";

      const title = document.createElement("h2");
      title.className = "section-title";
      title.textContent = getCategoryTitle(category);

      const subtitle = document.createElement("p");
      subtitle.className = "section-sub";
      subtitle.textContent = getCategorySubtitle(category);

      head.appendChild(title);
      head.appendChild(subtitle);

      const cards = document.createElement("div");
      cards.className = "cards";

      const sectionProducts = products.filter(product => product.category === category.id);
      sectionProducts.forEach((product, index) => {
        cards.appendChild(createCard(product, index));
      });

      shell.appendChild(head);
      shell.appendChild(cards);
      section.appendChild(shell);

      return section;
    }

    function renderMenu(){
      el.menuRoot.innerHTML = "";
      categories.forEach(category => {
        el.menuRoot.appendChild(createSection(category));
      });
    }

    function applyLanguage(){
      el.html.lang = ui[state.lang].htmlLang;
      el.html.dir = ui[state.lang].dir;

      el.brandAr.textContent = t("brandAr");
      el.brandEn.textContent = t("brandEn");
      el.brandSub.textContent = t("brandSub");
      el.metaOne.textContent = t("metaOne");
      el.metaTwo.textContent = t("metaTwo");
      el.metaThree.textContent = t("metaThree");
      el.navHot.textContent = t("navHot");
      el.navCold.textContent = t("navCold");
      el.navCrepe.textContent = t("navCrepe");
      el.navWaffle.textContent = t("navWaffle");
      el.menuNav.setAttribute("aria-label", t("navLabel"));
      el.footerText.textContent = t("footerText");

      el.btnAr.classList.toggle("active", state.lang === "ar");
      el.btnEn.classList.toggle("active", state.lang === "en");
      el.btnAr.setAttribute("aria-pressed", String(state.lang === "ar"));
      el.btnEn.setAttribute("aria-pressed", String(state.lang === "en"));

      renderMenu();
    }

    function updateActiveNav(){
      const sections = document.querySelectorAll(".menu-section");
      const links = document.querySelectorAll(".menu-link");

      let currentId = "";

      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        if (rect.top <= 140 && rect.bottom >= 140){
          currentId = section.id;
        }
      });

      links.forEach(link => {
        link.classList.toggle("is-active", link.dataset.section === currentId);
      });
    }

    el.btnAr.addEventListener("click", () => {
      state.lang = "ar";
      applyLanguage();
      updateActiveNav();
    });

    el.btnEn.addEventListener("click", () => {
      state.lang = "en";
      applyLanguage();
      updateActiveNav();
    });

    window.addEventListener("scroll", updateActiveNav, { passive: true });
    window.addEventListener("load", updateActiveNav);

    applyLanguage();
    updateActiveNav();
  </script>
</body>
</html>
